name: MenuBarSpacing
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  MenuBarSpacing:
    type: application
    platform: macOS
    sources:
      - path: MenuBarSpacing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beyondthecode.menubarspacing
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: MenuBarSpacing/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: MenuBarSpacing/App/MenuBarSpacing.entitlements
        PRODUCT_NAME: "Menu Bar Spacing"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
